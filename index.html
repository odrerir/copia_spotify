<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Hashtag</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="music-container">
        <header>
            <h4 class="playlist-title">Playlist Hashtag</h4>
        </header>

        <figure class="cover-figure">
            <img id="cover" class="cover" alt="Disc Cover">
        </figure>

        <audio id="audio"></audio>

        <section class="below-cover">
            <div id="song-info">
                <p id="song-name" class="song-name"></p>
                <p id="artist-name" class="artist-name light-color"></p>
            </div>
            <button id="like" class="button light-color" aria-label="Like song">
                <i class="bi bi-heart"></i>
            </button>
        </section>

        <section id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar">
                <div id="current-progress" class="current-progress"></div>
            </div>
            <div class="time-box">
                <time id="song-time">00:00</time>
                <time id="total-time">00:00</time>
            </div>
        </section>

        <nav class="button-container" aria-label="Playback controls">
            <button id="suffle" class="button" aria-label="Shuffle"><i class="bi bi-shuffle"></i></button>
            <button id="previous" class="button button-navigation" aria-label="Previous song"><i class="bi bi-skip-backward-fill"></i></button>
            <button id="play" class="button button-biggest" aria-label="Play"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next" class="button button-navigation" aria-label="Next song"><i class="bi bi-skip-forward-fill"></i></button>
            <button id="repeat" class="button" aria-label="Repeat"><i class="bi bi-repeat"></i></button>
        </nav>
    </main>

    <script src="script.js"></script>
</body>
</html>
