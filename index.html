<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-container">
        <h4 class="playlist-title">Playlist Hashtag</h4>
        <img id="cover" class="cover" alt="Disc Cover">
        <audio id="audio"></audio>
        <div class="below-cover">
            <div id="song-info">
                <p id="song-name" class="song-name"></p>
                <p id="artist-name" class="artist-name light-color"></p>
            </div>
            <button id="like" class="button light-color"><i class="bi bi-heart"></i></button>

        </div>
        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar" >
                <div id="current-progress" class="current-progress"></div>
            </div>
            <div class="time-box">
                <div id="song-time">00:00</div>
                <div id="total-time">00:00</div>
            </div>
        </div>
        <div class="button-container">
            <button id="suffle" class="button"><i class="bi bi-shuffle"></i></button>
            <button id="previous" class="button button-navigation"><i class="bi bi-skip-backward-fill"></i></button>
            <button id="play" class="button button-biggest"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next" class="button button-navigation"><i class="bi bi-skip-forward-fill"></i></button>
            <button id="repeat" class="button"><i class="bi bi-repeat"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
